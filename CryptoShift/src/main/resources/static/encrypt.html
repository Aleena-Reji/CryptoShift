<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encrypt Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00ffe7;
      --pink: #ff2d78;
      --blue: #3d9bff;
      --mint: #00ffb0;
      --red:  #ff4444;
      --bg:   #07080f;
      --surface: #0d0f1a;
      --border:  #1e2235;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background-color: var(--bg);
      color: #c8cfe8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 44px 24px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,155,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; top: -120px; left: -120px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(0,255,176,0.07) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; color: #2e3450;
      text-decoration: none; letter-spacing: 0.1em;
      margin-bottom: 36px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--blue); }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 30px; font-weight: 900;
      letter-spacing: 0.1em; margin-bottom: 6px;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-sub {
      font-size: 13px; color: var(--mint);
      letter-spacing: 0.15em; opacity: 0.55;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--cyan);
      border-right: 2px solid var(--blue);
      border-radius: 4px;
      padding: 30px;
      position: relative;
    }

    .card::after {
  display: none;
}

    label {
      display: block; font-size: 12px;
      letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    label.l-msg   { color: var(--cyan);  opacity: 0.8; }
    label.l-shift { color: var(--blue);  opacity: 0.8; }

    textarea, input[type="number"] {
      width: 100%;
      background: #07080f;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #d8e0ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 24px;
    }

    textarea { height: 130px; resize: vertical; }

    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px rgba(0,255,231,0.15), inset 0 0 14px rgba(0,255,231,0.04);
    }
    input[type="number"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px rgba(61,155,255,0.2);
    }

    input[type="number"] { max-width: 130px; }

    .encrypt-btn {
      width: 100%; padding: 16px;
      font-size: 15px;
      font-family: 'Orbitron', sans-serif; font-weight: 700;
      letter-spacing: 0.2em;
      border: 1px solid var(--cyan);
      border-radius: 3px; cursor: pointer;
      background: rgba(0,255,231,0.07);
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0,255,231,0.6);
      box-shadow: 0 0 18px rgba(0,255,231,0.08), inset 0 0 18px rgba(0,255,231,0.03);
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .encrypt-btn:hover {
      background: rgba(0,255,231,0.13);
      box-shadow: 0 0 32px rgba(0,255,231,0.22);
    }
    .encrypt-btn:active { transform: scale(0.99); }

    .result-box {
      display: none; margin-top: 24px; padding: 18px;
      background: rgba(0,255,176,0.04);
      border: 1px solid rgba(0,255,176,0.25);
      border-left: 3px solid var(--mint);
      border-radius: 3px;
    }

    .result-label {
      font-size: 11px; color: var(--mint);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 12px; opacity: 0.8;
    }

    .result-text {
      font-size: 15px; color: #b0ffe8;
      word-break: break-all; line-height: 1.8;
    }

    .error {
      font-size: 13px; color: var(--red);
      margin-top: 14px; letter-spacing: 0.05em; display: none;
    }
    .error::before { content: '⚠ '; }
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">&#8592; BACK</a>

  <h2>ENCRYPT</h2>
  <p class="page-sub"></p>

  <div class="card">
    <label class="l-msg" for="textInput">Input message</label>
    <textarea id="textInput" placeholder="Type your message here..."></textarea>

    <label class="l-shift" for="shiftInput">Shift value (1 – 94)</label>
    <input type="number" id="shiftInput" value="3" min="1" max="94" />

    <button class="encrypt-btn" onclick="runEncrypt()">[ ENCRYPT ]</button>

    <div class="error" id="errorMsg">Please enter a message and a valid shift (1–94).</div>

    <div class="result-box" id="resultBox">
      <div class="result-label">Encrypted output</div>
      <div class="result-text" id="resultText"></div>
    </div>
  </div>
</div>

<script>
  async function runEncrypt() {
    const text = document.getElementById('textInput').value;
    const shift = parseInt(document.getElementById('shiftInput').value);
    const errorMsg = document.getElementById('errorMsg');
    const resultBox = document.getElementById('resultBox');
    errorMsg.style.display = 'none';
    resultBox.style.display = 'none';
    if (!text.trim() || isNaN(shift) || shift < 1 || shift > 94) {
      errorMsg.style.display = 'block'; return;
    }
    try {
      const res = await fetch(`/message/encrypt?text=${encodeURIComponent(text)}&shift=${shift}`);
      const result = await res.text();
      document.getElementById('resultText').textContent = result;
      resultBox.style.display = 'block';
    } catch (err) {
      errorMsg.textContent = '⚠ Error: ' + err.message;
      errorMsg.style.display = 'block';
    }
  }
</script>
</body>
</html>
